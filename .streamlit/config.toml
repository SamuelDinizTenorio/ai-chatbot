[theme]
# Cor de destaque (botões, foco de inputs, barras de progresso)
primaryColor = "#7A1CAC"

# Cor de fundo da área principal do chat
backgroundColor = "#1E1E2E"

# Cor de fundo dos menus laterais ou caixas de diálogo
secondaryBackgroundColor = "#252538"

# Cor do texto principal
textColor = "#F5F5F5"

# Fonte do texto (sans serif, serif ou monospace)
font = "sans serif"
