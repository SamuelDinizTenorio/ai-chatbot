name: CI - Automated Testing Pipeline

# ==============================================================================
# PIPELINE TRIGGER CONFIGURATION
# ==============================================================================

# Evaluates and triggers the automated workflow on push or pull requests
# targeting the 'main' branch to ensure continuous integration standards.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
# ==============================================================================
# QUALITY ASSURANCE & TESTING SUITE
# ==============================================================================
  test:
    name: Run Verification and Test Suite
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest ruff
        pip install -r requirements.txt

    - name: Validate Syntax, Style, and Imports (Ruff Linter)
      run: |
        ruff check .

    - name: Execute Automated Unit & Integration Tests (PyTest)
      run: |
        pytest
        